<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartHire.AI — Reset Password</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap');

  * { box-sizing:border-box; margin:0; padding:0; }

  body { 
    min-height:100vh; 
    background:#0a0a0f; 
    display:flex; 
    align-items:center; 
    justify-content:center;
    padding:20px;
    font-family:'Inter',sans-serif;
    position:relative;
  }

  body::before {
    content:'';
    position:fixed;
    inset:0;
    background-image:
      linear-gradient(rgba(99,102,241,.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99,102,241,.06) 1px, transparent 1px);
    background-size:40px 40px;
    pointer-events:none;
    z-index:0;
  }

  .wrap {
    max-width:480px;
    width:100%;
    background:#0a0a0f;
    border-radius:8px;
    overflow:hidden;
    position:relative;
    box-shadow:0 20px 60px rgba(0,0,0,.5);
    border:1px solid rgba(99,102,241,.15);
    z-index:1;
  }

  .wrap::before {
    content:'';
    position:absolute;
    inset:0;
    background-image:
      linear-gradient(rgba(99,102,241,.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99,102,241,.06) 1px, transparent 1px);
    background-size:40px 40px;
    pointer-events:none;
  }

  .content {
    padding:48px 40px;
    position:relative;
  }

  .logo-row {
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin-bottom:32px;
    opacity:0;
    animation:up .5s .1s ease forwards;
  }
  .logo-icon {
    width:32px; height:32px;
    background:linear-gradient(135deg,#6366f1,#8b5cf6);
    border-radius:8px;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .logo-icon svg { width:16px; height:16px; }
  .logo-text {
    font-size:.95rem;
    font-weight:600;
    color:#fff;
    letter-spacing:-.01em;
  }
  .logo-text span { color:#818cf8; }

  .header {
    text-align:center;
    margin-bottom:32px;
    opacity:0;
    animation:up .6s .2s ease forwards;
  }
  .header h2 {
    font-size:1.7rem;
    font-weight:600;
    color:#fff;
    letter-spacing:-.03em;
    margin-bottom:8px;
  }
  .header p {
    font-size:.78rem;
    color:rgba(255,255,255,.35);
    font-weight:300;
    line-height:1.6;
  }

  .field {
    margin-bottom:24px;
    opacity:0;
    animation:up .6s .3s ease forwards;
  }

  .field label {
    display:block;
    font-size:.67rem;
    font-weight:500;
    color:rgba(255,255,255,.4);
    letter-spacing:.04em;
    margin-bottom:8px;
    transition:color .2s;
  }
  .field:focus-within label { color:#818cf8; }

  .input-wrap { position:relative; }
  .input-wrap input {
    width:100%;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.08);
    border-radius:8px;
    padding:11px 14px;
    font-family:'Inter',sans-serif;
    font-size:.82rem;
    font-weight:300;
    color:#fff;
    outline:none;
    transition:border-color .25s, box-shadow .25s, background .25s;
    caret-color:#6366f1;
    letter-spacing:.01em;
  }
  .input-wrap input::placeholder { color:rgba(255,255,255,.18); }
  .input-wrap input:focus {
    border-color:rgba(99,102,241,.5);
    background:rgba(99,102,241,.06);
    box-shadow:0 0 0 3px rgba(99,102,241,.12);
  }

  .submit-wrap {
    opacity:0;
    animation:up .6s .4s ease forwards;
  }

  .btn-main {
    width:100%;
    padding:13px;
    background:linear-gradient(135deg,#6366f1,#8b5cf6);
    border:none;
    border-radius:8px;
    font-family:'Inter',sans-serif;
    font-size:.82rem;
    font-weight:600;
    color:#fff;
    cursor:pointer;
    position:relative;
    overflow:hidden;
    transition:opacity .2s, transform .15s;
    letter-spacing:.01em;
  }
  .btn-main::before {
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(135deg,rgba(255,255,255,.15),transparent);
    pointer-events:none;
  }
  .btn-main:hover { opacity:.88; }
  .btn-main:active { transform:scale(.98); }
  .btn-main:disabled { opacity:.6; cursor:not-allowed; }

  .back-link {
    text-align:center;
    margin-top:20px;
    font-size:.7rem;
    color:rgba(255,255,255,.28);
    opacity:0;
    animation:up .5s .5s ease forwards;
  }
  .back-link a {
    color:#818cf8;
    text-decoration:none;
    font-weight:500;
    margin-left:4px;
  }
  .back-link a:hover { color:#a5b4fc; }

  .error-msg, .success-msg {
    border-radius:8px;
    padding:12px;
    margin-bottom:20px;
    font-size:.75rem;
    display:none;
  }
  .error-msg {
    background:rgba(239,68,68,.1);
    border:1px solid rgba(239,68,68,.3);
    color:#fca5a5;
  }
  .success-msg {
    background:rgba(34,197,94,.1);
    border:1px solid rgba(34,197,94,.3);
    color:#86efac;
  }

  .info-box {
    background:rgba(99,102,241,.1);
    border:1px solid rgba(99,102,241,.25);
    border-radius:8px;
    padding:14px;
    margin-top:20px;
    font-size:.72rem;
    color:rgba(255,255,255,.5);
    line-height:1.6;
    opacity:0;
    animation:up .6s .45s ease forwards;
  }

  @keyframes up { from{opacity:0;transform:translateY(12px);} to{opacity:1;transform:translateY(0);} }
</style>
</head>
<body>

<div class="wrap">
  <div class="content">
    <div class="logo-row">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
      </div>
      <div class="logo-text">SmartHire<span>.AI</span></div>
    </div>

    <div class="header">
      <h2>Reset password</h2>
      <p>Enter your email and we'll send you a reset link</p>
    </div>

    <div id="errorMsg" class="error-msg"></div>
    <div id="successMsg" class="success-msg"></div>

    <form id="resetForm">
      <div class="field">
        <label>Email address</label>
        <div class="input-wrap">
          <input type="email" id="emailInp" placeholder="name@company.com" autocomplete="email" required/>
        </div>
      </div>

      <div class="submit-wrap">
        <button type="submit" class="btn-main" id="resetBtn">
          <span id="btnTxt">Send reset link</span>
        </button>
      </div>

      <div class="info-box">
        💡 For demo purposes, your new password will be displayed here. In production, this would be sent via email.
      </div>
    </form>

    <div class="back-link">
      Remember your password?<a href="login.html">Sign in</a>
    </div>
  </div>
</div>

<script>
  const API_URL = 'http://localhost:5000/api';

  function showError(message) {
    const errorMsg = document.getElementById('errorMsg');
    errorMsg.textContent = message;
    errorMsg.style.display = 'block';
    document.getElementById('successMsg').style.display = 'none';
    setTimeout(() => {
      errorMsg.style.display = 'none';
    }, 5000);
  }

  function showSuccess(message) {
    const successMsg = document.getElementById('successMsg');
    successMsg.innerHTML = message;
    successMsg.style.display = 'block';
    document.getElementById('errorMsg').style.display = 'none';
  }

  document.getElementById('resetForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const btn = document.getElementById('resetBtn');
    const txt = document.getElementById('btnTxt');
    const email = document.getElementById('emailInp').value;
    
    btn.disabled = true;
    txt.textContent = 'Sending…';
    
    try {
      const response = await fetch(`${API_URL}/reset-password`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ email: email })
      });
      
      const data = await response.json();
      
      if (data.success) {
        showSuccess(`✓ Password reset successful!<br><br><strong>Your new password:</strong> ${data.new_password}<br><br>Please save this and <a href="login.html" style="color:#86efac;text-decoration:underline;">sign in</a> with your new password.`);
        document.getElementById('resetForm').style.display = 'none';
      } else {
        showError(data.message || 'Password reset failed. Please try again.');
        txt.textContent = 'Send reset link';
        btn.disabled = false;
      }
    } catch (error) {
      showError('Connection error. Make sure the backend server is running (python api_server.py)');
      txt.textContent = 'Send reset link';
      btn.disabled = false;
    }
  });
</script>

</body>
</html>
