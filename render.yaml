services:
  - type: web
    name: smarthire-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn backend.api_server:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
    disk:
      name: smarthire-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
