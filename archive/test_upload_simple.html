<!DOCTYPE html>
<html>
<head>
    <title>Quick Upload Test</title>
    <style>
        body { font-family: Arial; padding: 40px; background: #f5f5f5; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; }
        h1 { color: #333; }
        input[type="file"] { margin: 20px 0; }
        button { background: #667eea; color: white; padding: 12px 30px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background: #5568d3; }
        #result { margin-top: 20px; padding: 15px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Upload Test</h1>
        <p>Select PDF or DOCX files to test upload:</p>
        <input type="file" id="files" multiple accept=".pdf,.docx">
        <br>
        <button onclick="testUpload()">Upload Files</button>
        <div id="result"></div>
    </div>

    <script>
        async function testUpload() {
            const files = document.getElementById('files').files;
            const result = document.getElementById('result');
            
            if (files.length === 0) {
                result.className = 'error';
                result.textContent = 'Please select files first!';
                return;
            }

            result.textContent = 'Uploading...';
            result.className = '';

            const formData = new FormData();
            for (let file of files) {
                formData.append('files', file);
            }

            try {
                const response = await fetch('http://localhost:5000/api/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                
                if (data.success) {
                    result.className = 'success';
                    result.innerHTML = `
                        <strong>✓ Success!</strong><br>
                        Uploaded: ${data.uploaded.join(', ')}<br>
                        Count: ${data.uploaded.length} files
                    `;
                } else {
                    result.className = 'error';
                    result.innerHTML = `<strong>✗ Failed:</strong> ${data.message}`;
                }

                console.log('Response:', data);
            } catch (error) {
                result.className = 'error';
                result.innerHTML = `<strong>✗ Error:</strong> ${error.message}<br><br>
                    Make sure API is running: <code>python simple_api.py</code>`;
                console.error('Error:', error);
            }
        }
    </script>
</body>
</html>
